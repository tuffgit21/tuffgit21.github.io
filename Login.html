    <style>
        body{
            background:#111;
            font-family:Arial, Helvetica, sans-serif;
        }
        /* hide checkbox */
        #menu-toggle {
            display: none;
        }
        .menu-btn{
            background:#11111100;
            color: white;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 10px;
            display: inline-block;
            text-decoration: none;
        }
    .menu{
        display: none;
        margin-top: 10px;
        background: #222;
        padding: 15px;
        width:200px;
        border-radius: 10px;
    }
    #menu-toggle:checked + .menu-btn + .menu {
        display: block;
    }
    .menu a{
        display: block;
        color: white;
        text-decoration: none;
        padding: 8px 0;
    }
    </style>
</head>
